<article class="resume-card">
  <div class="section-heading">
    <span class="material-icons-outlined" aria-hidden="true">person</span>
    <div>
      <p>Personal Details</p>
      <h2>{{ details.name }}</h2>
    </div>
  </div>

  <p class="role">{{ details.role }}</p>
  <p class="summary">{{ details.summary }}</p>

  <dl class="detail-grid">
    <div>
      <dt>Date of Birth</dt>
      <dd>{{ details.dateOfBirth }}</dd>
    </div>
    <div>
      <dt>Gender</dt>
      <dd>{{ details.gender }}</dd>
    </div>
    <div>
      <dt>Nationality</dt>
      <dd>{{ details.nationality }}</dd>
    </div>
  </dl>
</article>
